<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
        <title>Checkout - OVRA</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        screens: {
                        '3xl': '1920px',
                        '4xl': '2560px',
                        }
                    }
                }
            }
        </script>
        <link rel="icon" href="logo.png">
    </head>
    <body>
        <nav class="relative flex items-center justify-between px-4 sm:px-6 md:px-10 lg:px-12 xl:px-16 2xl:px-20 py-2 md:py-3 lg:py-3 xl:py-4 2xl:py-4">
            <div class="flex items-center gap-2 md:gap-3">
                <a href="index.html"><h3 class="text-[#f5576c] font-bold text-xl md:text-2xl lg:text-3xl xl:text-4xl 2xl:text-5xl tracking-tighter">OVRA</h3></a>
            </div>
            
            <!-- desktop navbar -->
            <ul class="hidden md:flex items-center gap-6 lg:gap-8 xl:gap-10 2xl:gap-12">
                <li class="text-sm lg:text-base xl:text-lg 2xl:text-xl font-extrabold tracking-widest cursor-pointer hover:opacity-60"><a href="who-we-are.html">WHO WE ARE</a></li>
                <li class="text-sm lg:text-base xl:text-lg 2xl:text-xl font-extrabold tracking-widest cursor-pointer hover:opacity-60"><a href="news-events.html">NEWS & EVENTS</a></li>
                <li class="text-sm lg:text-base xl:text-lg 2xl:text-xl font-extrabold tracking-widest cursor-pointer hover:opacity-60"><a href="get-involved.html">GET INVOLVED</a></li>
                <li class="text-sm lg:text-base xl:text-lg 2xl:text-xl font-extrabold tracking-widest cursor-pointer hover:opacity-60"><a href="preorder.html">PREORDER</a></li>
            </ul>

            <div class="hidden md:flex items-center gap-2 sm:gap-4">
                <a href="cart.html" class="icon-btn relative" title="CART">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-[#f5576c] text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </a>
                
                <a href="https://www.instagram.com/ovra.health/" target="_blank" class="icon-btn" title="INSTAGRAM">
                    <img src="ig.png" alt="Instagram">
                </a>

                <a href="ai.html">
                    <button class="icon-btn" title="CHATBOT">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H6L4 18V4H20V16Z" fill="currentColor"/>
                            <circle cx="8" cy="10" r="1" fill="currentColor"/>
                            <circle cx="12" cy="10" r="1" fill="currentColor"/>
                            <circle cx="16" cy="10" r="1" fill="currentColor"/>
                        </svg>
                    </button>
                </a>

                <a href="https://gofund.me/160490e01" target="_blank"><button class="nav-btn">Donate</button></a>
                <a href="https://www.instagram.com/ovra.health/" target="_blank"><button class="nav-btn">Join</button></a>
            </div>

            <!-- mobile hamburger -->
            <button id="mobile-menu-button" class="md:hidden flex flex-col gap-1.5 p-2" aria-label="Toggle menu">
                <span class="w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
                <span class="w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
                <span class="w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
            </button>

            <!--mobile side menu-->
            <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-50 flex flex-col pt-20 px-6 transform translate-x-full transition-transform duration-300 md:hidden overflow-y-auto">
                <ul class="flex flex-col gap-6 mb-8">
                    <li class="text-xl font-extrabold tracking-widest"><a href="who-we-are.html" class="block py-2">WHO WE ARE</a></li>
                    <li class="text-xl font-extrabold tracking-widest"><a href="news-events.html" class="block py-2">NEWS & EVENTS</a></li>
                    <li class="text-xl font-extrabold tracking-widest"><a href="get-involved.html" class="block py-2">GET INVOLVED</a></li>
                    <li class="text-xl font-extrabold tracking-widest"><a href="preorder.html" class="block py-2">PREORDER</a></li>
                </ul>
                <div class="flex flex-col gap-4">
                    <a href="cart.html" class="flex items-center gap-3 py-3 border-b border-gray-200">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="font-bold">CART</span>
                    </a>
                    <a href="https://www.instagram.com/ovra.health/" target="_blank" class="flex items-center gap-3 py-3 border-b border-gray-200">
                        <img src="ig.png" alt="Instagram" class="w-6 h-6">
                        <span class="font-bold">INSTAGRAM</span>
                    </a>
                    <a href="ai.html" target="_blank" class="flex items-center gap-3 py-3 border-b border-gray-200">
                        <img src="https://static.thenounproject.com/png/1156284-200.png" class="w-6 h-6">
                        <span class="font-bold">CHATBOT</span>
                    </a>
                    <a href="https://gofund.me/160490e01" target="_blank" class="nav-btn text-center">Donate</a>
                    <a href="https://www.instagram.com/ovra.health/" target="_blank" class="nav-btn text-center">Join</a>
                </div>
            </div>
        </nav>

        <!-- checkout section -->
        <section class="py-12 sm:py-16 md:py-24 px-4 sm:px-6 md:px-10 lg:px-20" style="background: linear-gradient(to bottom, #ffffff, #e4bacd);">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold mb-6 sm:mb-8 tracking-tighter">Checkout</h1>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8">
                    <div class="bg-white/60 backdrop-blur-sm rounded-2xl md:rounded-3xl p-4 sm:p-6 md:p-8 border border-gray-200/50 shadow-xl">
                        <h2 class="text-xl sm:text-2xl md:text-3xl font-bold mb-4 sm:mb-6">Shipping Information</h2>
                        <form id="shipping-form" class="space-y-3 sm:space-y-4">
                            <div>
                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">Full Name</label>
                                <input type="text" id="shipping-name" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">Email</label>
                                <input type="email" id="shipping-email" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">Phone</label>
                                <input type="tel" id="shipping-phone" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">Address</label>
                                <input type="text" id="shipping-address" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                            </div>
                            <div class="grid grid-cols-2 gap-3 sm:gap-4">
                                <div>
                                    <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">City</label>
                                    <input type="text" id="shipping-city" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-2">ZIP Code</label>
                                    <input type="text" id="shipping-zip" required class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base rounded-lg border-2 border-gray-300 focus:border-pink-500 focus:outline-none">
                                </div>
                            </div>
                        </form>
                    </div>
                    
                    <div class="bg-white/60 backdrop-blur-sm rounded-2xl md:rounded-3xl p-4 sm:p-6 md:p-8 border border-gray-200/50 shadow-xl">
                        <h2 class="text-xl sm:text-2xl md:text-3xl font-bold mb-4 sm:mb-6">Order Summary</h2>
                        <div id="order-items" class="space-y-2 sm:space-y-3 mb-4 sm:mb-6 text-sm sm:text-base">
                        </div>
                        <div class="border-t border-gray-300 pt-3 sm:pt-4">
                            <div class="flex justify-between mb-3 sm:mb-4 text-sm sm:text-base">
                                <span class="font-semibold">Subtotal:</span>
                                <span id="order-subtotal" class="font-bold">$0.00</span>
                            </div>
                            <div class="flex justify-between mb-3 sm:mb-4 text-sm sm:text-base">
                                <span class="font-semibold">Shipping:</span>
                                <span class="font-bold">$5.00</span>
                            </div>
                            <div class="flex justify-between mb-4 sm:mb-6">
                                <span class="text-lg sm:text-xl font-bold">Total:</span>
                                <span id="order-total" class="text-xl sm:text-2xl font-bold text-[#f5576c]">$0.00</span>
                            </div>
                        </div>
                        <div id="paypal-button-container" class="mt-4 sm:mt-6">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script type="module" src="cart.js"></script>
        <script type="module" src="checkout.js"></script>
        <script type="module" src="script.js"></script>
    </body>
</html>
